<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Sudsy Sisters"/>
<meta name="theme-color" content="#C2587A"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<title>Sudsy Sisters</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --cream:#FFF0F5;--white:#fff;--brown:#C2587A;--brown-l:#D4799A;--brown-d:#8B2A4A;
  --sage:#E8A0B4;--sage-l:#F5D0DC;--amber:#E07090;--red:#C0392B;--red-l:#FADBD8;
  --text:#3D1A2A;--muted:#9B6070;--border:#F0C0CF;--card:#fff;--shadow:rgba(180,80,120,.12);
  --bar-h:60px;--safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--cream);color:var(--text);font-family:Lato,sans-serif;-webkit-text-size-adjust:100%}
#app{height:100%;display:flex;flex-direction:column;padding-top:var(--safe-t)}
#header{background:var(--brown);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;box-shadow:0 2px 10px var(--shadow)}
#header-back{display:none;background:none;border:none;color:#fff;cursor:pointer;padding:4px 8px 4px 0}
#header-back svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
#header-titles{flex:1;min-width:0}
#header-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#header-sub{font-size:.68rem;font-weight:300;opacity:.72;text-transform:uppercase;letter-spacing:.9px;margin-top:1px}
#header-add{background:rgba(255,255,255,.18);border:none;color:#fff;cursor:pointer;padding:8px;border-radius:10px;display:flex;align-items:center;transition:background .15s}
#header-add:active{background:rgba(255,255,255,.3)}
#header-add svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;display:block}
#content{flex:1;overflow:hidden;position:relative}
.view{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--bar-h) + var(--safe-b) + 10px);display:none}
.view.active{display:block}
#nav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--bar-h) + var(--safe-b));background:var(--white);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);z-index:200;box-shadow:0 -2px 12px var(--shadow)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:.58rem;font-family:Lato,sans-serif;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding-top:6px;transition:color .2s}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--brown)}
.search-bar{padding:12px 14px 6px;position:sticky;top:0;background:var(--cream);z-index:10}
.search-inner{background:var(--white);border:1.5px solid var(--border);border-radius:12px;display:flex;align-items:center;padding:8px 12px;gap:8px;box-shadow:0 1px 4px var(--shadow);transition:border-color .2s}
.search-inner:focus-within{border-color:var(--brown-l)}
.search-inner svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.search-inner input{flex:1;border:none;outline:none;background:none;font-family:Lato,sans-serif;font-size:.9rem;color:var(--text)}
.search-inner input::placeholder{color:var(--muted)}
.s-clear{background:none;border:none;cursor:pointer;color:var(--muted);padding:0 2px;font-size:1.2rem;line-height:1;display:flex}
.chips{display:flex;gap:7px;overflow-x:auto;padding:4px 14px 10px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.73rem;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap;letter-spacing:.3px;transition:all .15s;font-family:Lato,sans-serif}
.chip.on{background:var(--brown);border-color:var(--brown);color:#fff}
.empty{text-align:center;padding:52px 30px;color:var(--muted)}
.empty-icon{font-size:2.8rem;margin-bottom:12px}
.empty h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--brown-d);margin-bottom:6px}
.empty p{font-size:.85rem;line-height:1.5}
.r-grid{padding:0 14px 8px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.r-card{background:var(--card);border-radius:14px;overflow:hidden;box-shadow:0 2px 8px var(--shadow);cursor:pointer;border:1px solid var(--border);transition:transform .13s}
.r-card:active{transform:scale(.97)}
.r-card-stripe{height:5px}
.r-card-body{padding:10px 11px 12px}
.r-card-name{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;line-height:1.3;color:var(--brown-d);margin-bottom:4px}
.r-card-cat{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.r-card-tags{display:flex;flex-wrap:wrap;gap:4px}
.tag{background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:2px 7px;font-size:.66rem;color:var(--muted);font-weight:700}
.detail{padding:14px}
.detail-header{background:var(--white);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border)}
.detail-badge{display:inline-block;color:#fff;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.detail-name{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--brown-d);margin-bottom:6px;line-height:1.2}
.detail-desc{font-size:.87rem;color:var(--muted);line-height:1.5}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.meta-pill{background:var(--cream);border:1px solid var(--border);border-radius:9px;padding:5px 10px;font-size:.75rem;color:var(--text)}
.meta-pill span{font-weight:700;color:var(--brown)}
.section{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border)}
.section-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:600;color:var(--brown-d);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.ing-row{display:flex;align-items:baseline;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--cream)}
.ing-row:last-child{border-bottom:none}
.ing-name{font-size:.87rem;color:var(--text);flex:1}
.ing-amt{font-size:.87rem;font-weight:700;color:var(--brown);white-space:nowrap;margin-left:10px}
.prose{font-size:.87rem;line-height:1.68;color:var(--text);white-space:pre-wrap}
.prose-muted{font-size:.84rem;line-height:1.62;color:var(--muted);font-style:italic;white-space:pre-wrap}
.detail-actions{display:flex;gap:10px;padding:0 14px 14px}
.btn{border:none;cursor:pointer;border-radius:12px;padding:11px 18px;font-family:Lato,sans-serif;font-weight:700;font-size:.87rem;display:inline-flex;align-items:center;gap:6px;justify-content:center;transition:all .15s}
.btn-primary{background:var(--brown);color:#fff;flex:1}
.btn-primary:active{background:var(--brown-d)}
.btn-danger{background:var(--red-l);color:var(--red);flex:1}
.btn-outline{background:var(--white);color:var(--brown);border:1.5px solid var(--border);flex:1}
.btn-full{width:100%}
.inv-list{padding:0 14px 8px;display:flex;flex-direction:column;gap:8px}
.inv-card{background:var(--card);border-radius:13px;padding:12px 14px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border);cursor:pointer;transition:transform .13s}
.inv-card:active{transform:scale(.98)}
.inv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.inv-name{font-family:'Playfair Display',serif;font-size:.97rem;font-weight:600;color:var(--brown-d)}
.inv-cat-tag{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:var(--cream);border:1px solid var(--border);padding:2px 8px;border-radius:7px;white-space:nowrap;margin-left:6px;flex-shrink:0}
.inv-qty-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.inv-qty{font-size:1.05rem;font-weight:700;color:var(--text)}
.inv-qty .unit{font-size:.77rem;font-weight:400;color:var(--muted);margin-left:3px}
.inv-status{font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:7px}
.s-ok{background:#E8F5E9;color:#2E7D32}
.s-low{background:#FFF3E0;color:#E65100}
.s-out{background:var(--red-l);color:var(--red)}
.inv-prog{height:5px;background:var(--cream);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.inv-prog-bar{height:100%;border-radius:4px;transition:width .4s}
.p-ok{background:var(--sage)}
.p-low{background:var(--amber)}
.p-out{background:var(--red)}
.calc-wrap{padding:14px}
.calc-card{background:var(--white);border-radius:14px;padding:16px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border);margin-bottom:12px}
.calc-card h3{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:600;color:var(--brown-d);margin-bottom:14px}
.form-group{margin-bottom:13px}
.form-group label{display:block;font-size:.75rem;font-weight:700;color:var(--brown-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.form-group select,.form-group input,.form-group textarea{width:100%;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:Lato,sans-serif;font-size:.9rem;color:var(--text);outline:none;-webkit-appearance:none;appearance:none;transition:border-color .2s}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--brown-l)}
.form-group textarea{resize:vertical;min-height:80px}
.form-row{display:flex;gap:10px}
.form-row .form-group{flex:1}
.mode-row{display:flex;gap:8px}
.mode-btn{flex:1;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:9px;font-family:Lato,sans-serif;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s}
.mode-btn.active{background:var(--brown);border-color:var(--brown);color:#fff}
.calc-result{background:var(--cream);border-radius:12px;padding:14px;border:1px solid var(--border)}
.calc-result-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:600;color:var(--brown-d);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.calc-row{display:flex;justify-content:space-between;align-items:baseline;padding:6px 0;border-bottom:1px solid rgba(224,212,192,.5)}
.calc-row:last-child{border-bottom:none}
.calc-row-name{font-size:.85rem;color:var(--text)}
.calc-row-amt{font-size:.85rem;font-weight:700;color:var(--brown)}
.calc-note{font-size:.76rem;color:var(--muted);text-align:center;margin-top:10px;font-style:italic}
.report-wrap{padding:14px}
.report-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.report-top h2{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--brown-d)}
.copy-btn{background:var(--brown);color:#fff;border:none;border-radius:10px;padding:8px 14px;font-family:Lato,sans-serif;font-size:.78rem;font-weight:700;cursor:pointer;letter-spacing:.4px}
.copy-btn:active{background:var(--brown-d)}
.report-section{margin-bottom:16px}
.report-sec-title{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding-bottom:6px;border-bottom:1px solid var(--border);margin-bottom:8px}
.report-item{background:var(--white);border-radius:12px;padding:11px 13px;margin-bottom:7px;box-shadow:0 1px 5px var(--shadow);border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ri-name{font-size:.88rem;font-weight:700;color:var(--brown-d)}
.ri-detail{font-size:.74rem;color:var(--muted);margin-top:2px}
.ri-need{font-size:.88rem;font-weight:700;color:var(--red);text-align:right}
.ri-have{font-size:.7rem;color:var(--muted);text-align:right;margin-top:2px}
.all-good{text-align:center;padding:40px 20px;color:var(--sage)}
.all-good p{font-size:.88rem;color:var(--muted);margin-top:6px}
.modal-overlay{position:fixed;inset:0;background:rgba(44,32,24,.48);z-index:500;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal-sheet{background:var(--cream);border-radius:20px 20px 0 0;width:100%;max-height:93vh;display:flex;flex-direction:column;padding-bottom:var(--safe-b);animation:slideUp .24s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 2px;flex-shrink:0}
.modal-hdr{display:flex;align-items:center;padding:10px 16px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--brown-d);flex:1}
.modal-close{background:none;border:none;cursor:pointer;font-size:1.5rem;color:var(--muted);padding:0 4px;line-height:1}
.modal-body{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;padding:14px 16px}
.modal-foot{padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
.ing-form-row{display:flex;gap:6px;align-items:center;margin-bottom:8px}
.ing-form-row input{flex:2;background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:Lato,sans-serif;font-size:.85rem;color:var(--text);outline:none;min-width:0}
.ing-form-row input.sm{flex:1}
.ing-form-row select{flex:1;background:var(--cream);border:1.5px solid var(--border);border-radius:8px;padding:8px 6px;font-family:Lato,sans-serif;font-size:.8rem;color:var(--text);outline:none;-webkit-appearance:none;min-width:0}
.ing-form-row input:focus,.ing-form-row select:focus{border-color:var(--brown-l)}
.ing-del{background:none;border:none;cursor:pointer;color:var(--red);font-size:1.4rem;padding:2px 4px;line-height:1;flex-shrink:0}
.add-row-btn{background:none;border:1.5px dashed var(--border);border-radius:10px;padding:9px;width:100%;font-family:Lato,sans-serif;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;margin-top:2px}
.add-row-btn:active{background:var(--white)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:6px 10px;min-height:42px;cursor:text}
.tag-wrap:focus-within{border-color:var(--brown-l)}
.tag-pill{background:var(--brown);color:#fff;border-radius:7px;padding:2px 8px;font-size:.75rem;display:flex;align-items:center;gap:4px;font-weight:700}
.tag-pill button{background:none;border:none;cursor:pointer;color:#fff;font-size:.9rem;padding:0;line-height:1}
.tag-input{border:none;outline:none;background:none;font-family:Lato,sans-serif;font-size:.85rem;color:var(--text);min-width:70px;flex:1;padding:2px 0}
.confirm-overlay{position:fixed;inset:0;background:rgba(44,32,24,.52);z-index:600;display:none;align-items:center;justify-content:center;padding:24px}
.confirm-overlay.open{display:flex}
.confirm-box{background:var(--white);border-radius:16px;padding:24px 20px;max-width:290px;width:100%;text-align:center;box-shadow:0 8px 32px var(--shadow)}
.confirm-box h3{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--brown-d);margin-bottom:8px}
.confirm-box p{font-size:.85rem;color:var(--muted);margin-bottom:18px;line-height:1.5}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;border:none;border-radius:12px;padding:11px;font-family:Lato,sans-serif;font-weight:700;font-size:.88rem;cursor:pointer}
.cbtn-cancel{background:var(--cream);color:var(--text);border:1.5px solid var(--border)!important}
.cbtn-ok{background:var(--red);color:#fff}
.cbtn-make{background:var(--brown);color:#fff}
.batch-ing-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.batch-ing-row:last-child{border-bottom:none}
.batch-ing-left{font-size:.85rem;color:var(--text)}
.batch-ing-right{font-size:.82rem;font-weight:700;text-align:right}
.batch-found{color:var(--red)}
.batch-notfound{color:var(--muted);font-style:italic}
.batch-inv-note{font-size:.72rem;color:var(--muted);margin-top:1px}
.toast{position:fixed;bottom:calc(var(--bar-h) + var(--safe-b) + 14px);left:50%;transform:translateX(-50%) translateY(16px);background:var(--brown-d);color:#fff;padding:10px 20px;border-radius:24px;font-size:.82rem;font-weight:700;z-index:700;opacity:0;transition:all .28s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.adj-row{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.adj-row input{flex:1;background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-family:Lato,sans-serif;font-size:.9rem;color:var(--text);outline:none}
.adj-row select{background:var(--cream);border:1.5px solid var(--border);border-radius:10px;padding:9px 10px;font-family:Lato,sans-serif;font-size:.85rem;color:var(--text);outline:none;-webkit-appearance:none}
.scan-overlay{position:fixed;inset:0;background:#000;z-index:800;display:none;flex-direction:column}
.scan-overlay.open{display:flex}
.scan-header{padding:calc(var(--safe-t) + 14px) 16px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.scan-title{color:#fff;font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:600}
.scan-close{background:rgba(255,255,255,.15);border:none;color:#fff;font-size:1.4rem;padding:6px 12px;border-radius:10px;cursor:pointer;font-family:Lato,sans-serif}
#scan-viewport{flex:1;position:relative;overflow:hidden}
#scan-viewport video{width:100%;height:100%;object-fit:cover}
.scan-frame{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.scan-box{width:240px;height:160px;border:2px solid var(--brown);border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}
.scan-line{position:absolute;top:50%;left:50%;transform:translate(-120px,-1px);width:240px;height:2px;background:var(--brown);animation:scanline 1.8s ease-in-out infinite}
@keyframes scanline{0%,100%{top:calc(50% - 75px)}50%{top:calc(50% + 75px)}}
.scan-hint{color:rgba(255,255,255,.8);font-size:.8rem;text-align:center;padding:10px;flex-shrink:0}
.scan-status{color:#fff;font-size:.85rem;text-align:center;padding:8px 16px;min-height:36px;flex-shrink:0}
.scan-lookup{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--sage-l)}
.scan-spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.scan-btn-row{padding:12px 16px calc(var(--safe-b) + 12px);display:flex;gap:10px;flex-shrink:0}
.btn-scan-action{flex:1;border:none;border-radius:12px;padding:12px;font-family:Lato,sans-serif;font-weight:700;font-size:.88rem;cursor:pointer}
.btn-scan-manual{background:rgba(255,255,255,.15);color:#fff}
.btn-scan-use{background:var(--brown);color:#fff;display:none}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <button id="header-back" onclick="App.goBack()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div id="header-titles">
      <div id="header-title">Recipes</div>
      <div id="header-sub">Sudsy Sisters</div>
    </div>
    <button id="header-add" onclick="App.handleAdd()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>
  <div id="content">
    <!-- RECIPES LIST -->
    <div id="view-recipes" class="view active">

<script>

const CAT_CLR = {'Bar Soap':'#C2587A','Liquid Soap':'#7A58C2','Lotion':'#D4799A','Body Butter':'#E07090','Body Oil':'#B07AB0','Scrub':'#C278A0','Other':'#9B6070'};

// ── SAMPLE DATA ───────────────────────────────────────────────
const SEED_RECIPES = [
  {id:'r1',name:'Classic Goat Milk Bar',category:'Bar Soap',difficulty:'Beginner',cureTime:'4–6 weeks',batchSize:'32',batchUnit:'oz',superfat:'5%',lye:'NaOH',scent:'Unscented',tags:['goat milk','moisturizing','sensitive skin'],description:'Creamy unscented bar using fresh GGG Farm goat milk. Great starter recipe.',ingredients:[{name:'Goat Milk (frozen)',amount:'8',unit:'oz'},{name:'Lye (NaOH)',amount:'4.2',unit:'oz'},{name:'Coconut Oil',amount:'8',unit:'oz'},{name:'Palm Oil',amount:'6',unit:'oz'},{name:'Olive Oil',amount:'10',unit:'oz'},{name:'Castor Oil',amount:'2',unit:'oz'}],instructions:'Slowly add lye to frozen goat milk to prevent scorching. Cool to 90–100°F. Melt and combine oils to same temp. Mix to light trace. Pour into mold. Insulate 24 hrs. Unmold after 48 hrs. Cure 4–6 weeks.',notes:'Keep batter cool — goat milk sugars cause overheating. Freeze milk in ice cube trays.',created:'2024-01-15'},
  {id:'r2',name:'Lavender & Shea Luxury Bar',category:'Bar Soap',difficulty:'Beginner',cureTime:'4 weeks',batchSize:'28',batchUnit:'oz',superfat:'6%',lye:'NaOH',scent:'Lavender',tags:['lavender','shea butter','floral'],description:'Soothing lavender bar with shea butter for extra conditioning.',ingredients:[{name:'Goat Milk (frozen)',amount:'7.5',unit:'oz'},{name:'Lye (NaOH)',amount:'4.1',unit:'oz'},{name:'Coconut Oil',amount:'8',unit:'oz'},{name:'Olive Oil',amount:'8',unit:'oz'},{name:'Shea Butter',amount:'4',unit:'oz'},{name:'Castor Oil',amount:'2',unit:'oz'},{name:'Lavender Essential Oil',amount:'1.5',unit:'oz'},{name:'Dried Lavender Buds',amount:'2',unit:'tbsp'}],instructions:'Standard cold process. Add EO at light trace. Sprinkle lavender buds on top after pouring.',notes:'Lavender EO can accelerate trace. Work quickly after adding fragrance.',created:'2024-02-01'},
  {id:'r3',name:'Honey Oat Exfoliating Bar',category:'Bar Soap',difficulty:'Intermediate',cureTime:'6 weeks',batchSize:'30',batchUnit:'oz',superfat:'5%',lye:'NaOH',scent:'Honey & Vanilla',tags:['exfoliating','honey','oatmeal'],description:'Gentle exfoliating bar with colloidal oats and raw honey.',ingredients:[{name:'Goat Milk (frozen)',amount:'8',unit:'oz'},{name:'Lye (NaOH)',amount:'4.0',unit:'oz'},{name:'Coconut Oil',amount:'7',unit:'oz'},{name:'Olive Oil',amount:'11',unit:'oz'},{name:'Sweet Almond Oil',amount:'4',unit:'oz'},{name:'Raw Honey',amount:'1',unit:'tbsp'},{name:'Colloidal Oatmeal',amount:'3',unit:'tbsp'},{name:'Vanilla Fragrance Oil',amount:'1',unit:'oz'}],instructions:'Mix honey into warm oils before combining with lye mixture. Add oats and FO at trace.',notes:'Honey causes overheating. Use loaf mold, do NOT insulate.',created:'2024-02-20'},
  {id:'r4',name:'Whipped Goat Milk Body Butter',category:'Body Butter',difficulty:'Beginner',cureTime:'None',batchSize:'16',batchUnit:'oz',superfat:'',lye:'None',scent:'Vanilla & Coconut',tags:['body butter','moisturizing','no-lye'],description:'Rich whipped body butter with goat milk powder. No lye required.',ingredients:[{name:'Shea Butter',amount:'6',unit:'oz'},{name:'Coconut Oil',amount:'4',unit:'oz'},{name:'Sweet Almond Oil',amount:'3',unit:'oz'},{name:'Arrowroot Powder',amount:'2',unit:'tbsp'},{name:'Goat Milk Powder',amount:'2',unit:'tbsp'},{name:'Vanilla Fragrance Oil',amount:'0.5',unit:'oz'},{name:'Coconut Fragrance Oil',amount:'0.3',unit:'oz'}],instructions:'Melt shea and coconut oil. Cool until partially solid (not liquid). Whip with hand mixer until fluffy. Add almond oil, arrowroot, goat milk powder, and fragrance. Whip to light and airy texture.',notes:'Partial solidification before whipping is key. Store in cool location.',created:'2024-03-05'},
  {id:'r5',name:'Peppermint Foot Scrub',category:'Scrub',difficulty:'Beginner',cureTime:'None',batchSize:'12',batchUnit:'oz',superfat:'',lye:'None',scent:'Peppermint',tags:['scrub','foot care','refreshing'],description:'Invigorating peppermint sugar scrub for tired feet.',ingredients:[{name:'Sugar (fine)',amount:'6',unit:'oz'},{name:'Coconut Oil',amount:'3',unit:'oz'},{name:'Sweet Almond Oil',amount:'2',unit:'oz'},{name:'Peppermint Essential Oil',amount:'0.5',unit:'oz'},{name:'Vitamin E Oil',amount:'0.25',unit:'oz'}],instructions:'Melt coconut oil. Let cool to room temp. Mix all ingredients together. Package in jars.',notes:'Do not get water in the jar — causes oil to go rancid. Use within 3 months.',created:'2024-03-15'}
];

const SEED_INV = [
  {id:'i1',name:'Coconut Oil',category:'Oils',quantity:96,unit:'oz',reorderAt:16,supplier:'Brambleberry',cost:'0.18',notes:'76 degree'},
  {id:'i2',name:'Olive Oil',category:'Oils',quantity:64,unit:'oz',reorderAt:16,supplier:'Local grocery',cost:'0.16',notes:'Pomace grade'},
  {id:'i3',name:'Shea Butter',category:'Oils',quantity:32,unit:'oz',reorderAt:8,supplier:'Brambleberry',cost:'0.22',notes:'Refined'},
  {id:'i4',name:'Castor Oil',category:'Oils',quantity:16,unit:'oz',reorderAt:4,supplier:'Brambleberry',cost:'0.28',notes:''},
  {id:'i5',name:'Palm Oil',category:'Oils',quantity:8,unit:'oz',reorderAt:16,supplier:'Brambleberry',cost:'0.15',notes:'RSPO certified'},
  {id:'i6',name:'Sweet Almond Oil',category:'Oils',quantity:24,unit:'oz',reorderAt:8,supplier:'Brambleberry',cost:'0.24',notes:''},
  {id:'i7',name:'Lye (NaOH)',category:'Lye & Alkalis',quantity:32,unit:'oz',reorderAt:8,supplier:'Essential Depot',cost:'0.19',notes:'99% pure'},
  {id:'i8',name:'Lavender Essential Oil',category:'Fragrance & EO',quantity:4,unit:'oz',reorderAt:2,supplier:'Brambleberry',cost:'1.85',notes:'Bulgarian'},
  {id:'i9',name:'Vanilla Fragrance Oil',category:'Fragrance & EO',quantity:1,unit:'oz',reorderAt:3,supplier:'Brambleberry',cost:'1.50',notes:'May discolor brown'},
  {id:'i10',name:'Peppermint Essential Oil',category:'Fragrance & EO',quantity:2,unit:'oz',reorderAt:2,supplier:'Brambleberry',cost:'1.60',notes:''},
  {id:'i11',name:'Goat Milk (frozen)',category:'Additives',quantity:128,unit:'oz',reorderAt:32,supplier:'GGG Farm',cost:'0.05',notes:'Freeze in ice cube trays'},
  {id:'i12',name:'Raw Honey',category:'Additives',quantity:16,unit:'oz',reorderAt:4,supplier:'Local farm',cost:'0.35',notes:''},
  {id:'i13',name:'Colloidal Oatmeal',category:'Additives',quantity:8,unit:'oz',reorderAt:2,supplier:'Amazon',cost:'0.30',notes:''},
  {id:'i14',name:'Goat Milk Powder',category:'Additives',quantity:12,unit:'oz',reorderAt:4,supplier:'Amazon',cost:'0.42',notes:''},
  {id:'i15',name:'Soap Mold (Loaf)',category:'Packaging',quantity:3,unit:'ea',reorderAt:1,supplier:'Brambleberry',cost:'12.00',notes:'Silicone 10-bar'},
  {id:'i16',name:'Kraft Soap Labels',category:'Packaging',quantity:18,unit:'ea',reorderAt:25,supplier:'Avery',cost:'0.08',notes:'4x2 inch'}
];

// ── APP ───────────────────────────────────────────────────────
const App = {
  tab:'recipes', subview:null,
  selRId:null, selIId:null,
  editR:null, editI:null,
  _calcMode:'oz', _rCat:'', _iCat:'',

  init(){
    this.recipes   = JSON.parse(localStorage.getItem('ss_r')||'null') || SEED_RECIPES;
    this.inventory = JSON.parse(localStorage.getItem('ss_i')||'null') || SEED_INV;
    if(!localStorage.getItem('ss_r')) this._saveR();
    if(!localStorage.getItem('ss_i')) this._saveI();
    this._buildChips('r-chips', R_CATS, '_rCat', 'renderRecipes');
    this._buildChips('i-chips', I_CATS, '_iCat', 'renderInventory');
    this.renderRecipes();
    this.renderInventory();
    this.populateCalcRecipes();
    this.renderOrders();
    if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  },
  _saveR(){ localStorage.setItem('ss_r', JSON.stringify(this.recipes)); },
  _saveI(){ localStorage.setItem('ss_i', JSON.stringify(this.inventory)); },
  uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); },
  h(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); },

  // TAB NAV
  setTab(t){
    this.tab=t; this.subview=null;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('nav-'+t).classList.add('active');
    const vmap={recipes:'view-recipes',inventory:'view-inventory',calc:'view-calc',orders:'view-orders'};
    document.getElementById(vmap[t]).classList.add('active');
    if(t==='orders') this.renderOrders();
    this._hdr();
  },
  goBack(){
    this.subview=null;
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    const vmap={recipes:'view-recipes',inventory:'view-inventory'};
    document.getElementById(vmap[this.tab]).classList.add('active');
    this._hdr();
  },
  handleAdd(){
    if(this.tab==='recipes') this.openRecipeModal(null);
    else if(this.tab==='inventory') this.openInvModal(null);
  },
  _hdr(){
    const back=document.getElementById('header-back');
    const title=document.getElementById('header-title');
    const sub=document.getElementById('header-sub');
    const add=document.getElementById('header-add');
    const TITLES={recipes:'Recipes',inventory:'Inventory',calc:'Calculator',orders:'Order Report'};
    if(this.subview==='recipe-detail'){
      const r=this.recipes.find(x=>x.id===this.selRId);
      back.style.display='flex'; add.style.display='none';
      title.textContent=r?r.name:'Recipe'; sub.textContent=r?r.category:'';
    } else if(this.subview==='inv-detail'){
      const i=this.inventory.find(x=>x.id===this.selIId);
      back.style.display='flex'; add.style.display='none';
      title.textContent=i?i.name:'Item'; sub.textContent=i?i.category:'';
    } else {
      back.style.display='none';
      add.style.display=(this.tab==='calc'||this.tab==='orders')?'none':'flex';
      title.textContent=TITLES[this.tab]; sub.textContent='Sudsy Sisters';
    }
  },

  // SEARCH
  clrSearch(inp,btn,fn){ document.getElementById(inp).value=''; document.getElementById(btn).style.display='none'; fn(); },

  // CHIPS
  _buildChips(wrapperId, cats, filterProp, fnName){
    const el=document.getElementById(wrapperId);
    el.innerHTML=['All',...cats].map(c=>`<button class="chip${c==='All'?' on':''}" data-v="${c}" onclick="App._setChip('${wrapperId}','${filterProp}','${c}','${fnName}')">${c}</button>`).join('');
  },
  _setChip(wrapperId, filterProp, val, fnName){
    this[filterProp]=val==='All'?'':val;
    document.querySelectorAll('#'+wrapperId+' .chip').forEach(c=>c.classList.toggle('on',c.dataset.v===val));
    this[fnName]();
  },

  // ── RECIPES ──────────────────────────────────────────────────
  renderRecipes(){
    const q=document.getElementById('r-search').value.toLowerCase();
    document.getElementById('r-clear').style.display=q?'flex':'none';
    let list=this.recipes.filter(r=>{
      const mq=!q||r.name.toLowerCase().includes(q)||(r.tags||[]).some(t=>t.toLowerCase().includes(q))||(r.scent||'').toLowerCase().includes(q)||(r.description||'').toLowerCase().includes(q);
      return mq&&(!this._rCat||r.category===this._rCat);
    });
    const wrap=document.getElementById('r-list');
    if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">🧼</div><h3>No recipes found</h3><p>${q||this._rCat?'Try a different filter.':'Tap + to add your first recipe!'}</p></div>`;return;}
    wrap.innerHTML=`<div class="r-grid">${list.map(r=>this._rCard(r)).join('')}</div>`;
  },
  _rCard(r){
    const clr=CAT_CLR[r.category]||'#8B7355';
    const tags=(r.tags||[]).slice(0,3).map(t=>`<span class="tag">${t}</span>`).join('');
    return `<div class="r-card" onclick="App.openRecipeDetail('${r.id}')">
      <div class="r-card-stripe" style="background:${clr}"></div>
      <div class="r-card-body">
        <div class="r-card-name">${this.h(r.name)}</div>
        <div class="r-card-cat">${r.category}${r.difficulty?' · '+r.difficulty:''}</div>
        <div class="r-card-tags">${tags}</div>
      </div></div>`;
  },
  openRecipeDetail(id){
    this.selRId=id; this.subview='recipe-detail';
    const r=this.recipes.find(x=>x.id===id);
    const clr=CAT_CLR[r.category]||'#8B7355';
    const ings=(r.ingredients||[]).map(i=>`<div class="ing-row"><span class="ing-name">${this.h(i.name)}</span><span class="ing-amt">${i.amount} ${i.unit}</span></div>`).join('');
    const tags=(r.tags||[]).map(t=>`<span class="tag">${this.h(t)}</span>`).join('');
    const metas=[
      r.batchSize?`<div class="meta-pill">Batch <span>${r.batchSize} ${r.batchUnit||'oz'}</span></div>`:'',
      r.cureTime?`<div class="meta-pill">Cure <span>${this.h(r.cureTime)}</span></div>`:'',
      r.superfat?`<div class="meta-pill">Superfat <span>${this.h(r.superfat)}</span></div>`:'',
      r.lye&&r.lye!=='None'?`<div class="meta-pill">Lye <span>${r.lye}</span></div>`:'',
      r.scent?`<div class="meta-pill">Scent <span>${this.h(r.scent)}</span></div>`:''
    ].filter(Boolean).join('');
    document.getElementById('view-recipe-detail').innerHTML=`
      <div class="detail">
        <div class="detail-header">
          <div class="detail-badge" style="background:${clr}">${this.h(r.category)}</div>
          <div class="detail-name">${this.h(r.name)}</div>
          ${r.description?`<div class="detail-desc">${this.h(r.description)}</div>`:''}
          <div class="meta-row">${metas}</div>
          ${tags?`<div class="meta-row" style="margin-top:8px">${tags}</div>`:''}
        </div>
        ${ings?`<div class="section"><div class="section-title">Ingredients</div>${ings}</div>`:''}

  // TAG INPUT
  _initTags(fid,init){
    const wrap=document.getElementById(fid+'-wrap');
    const hidden=document.getElementById(fid);
    const input=document.getElementById(fid+'-inp');
    let tags=[...(init||[])];
    const render=()=>{
      wrap.querySelectorAll('.tag-pill').forEach(p=>p.remove());
      tags.forEach((t,i)=>{
        const p=document.createElement('div'); p.className='tag-pill';
        p.innerHTML=`${this.h(t)}<button onclick="_rmTag(${i})">×</button>`;
        wrap.insertBefore(p,input);
      });
      hidden.value=JSON.stringify(tags);
    };
    window._rmTag=(i)=>{tags.splice(i,1);render();};
    input.addEventListener('keydown',e=>{
      if((e.key==='Enter'||e.key===',')&&input.value.trim()){
        e.preventDefault(); const v=input.value.replace(',','').trim();
        if(v&&!tags.includes(v)){tags.push(v);render();} input.value='';
      } else if(e.key==='Backspace'&&!input.value&&tags.length){tags.pop();render();}
    });
    wrap.addEventListener('click',()=>input.focus());
    render();
  },

  // ── INVENTORY ────────────────────────────────────────────────
  _iStat(i){ if(i.quantity<=0) return 'out'; if(i.quantity<=i.reorderAt) return 'low'; return 'ok'; },

      const mq=!q||i.name.toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q)||(i.supplier||'').toLowerCase().includes(q);
      return mq&&(!this._iCat||i.category===this._iCat);
    });
    list.sort((a,b)=>{const o={out:0,low:1,ok:2};return(o[this._iStat(a)]||0)-(o[this._iStat(b)]||0)||a.name.localeCompare(b.name);});
    const wrap=document.getElementById('i-list');
    if(!list.length){wrap.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><h3>No items found</h3><p>${q||this._iCat?'Try a different filter.':'Tap + to add ingredients.'}</p></div>`;return;}
    wrap.innerHTML=`<div class="inv-list">${list.map(i=>this._iCard(i)).join('')}</div>`;
  },
  _iCard(i){
    const st=this._iStat(i);

    const sl={ok:'In Stock',low:'Low Stock',out:'Out of Stock'};
    return `<div class="inv-card" onclick="App.openInvDetail('${i.id}')">
      <div class="inv-top"><div class="inv-name">${this.h(i.name)}</div><div class="inv-cat-tag">${this.h(i.category)}</div></div>
      <div class="inv-qty-row">
        <div class="inv-qty">${i.quantity}<span class="unit">${i.unit}</span></div>
        <div class="inv-status s-${st}">${sl[st]}</div>
      </div>
      <div class="inv-prog"><div class="inv-prog-bar p-${st}" style="width:${pct.toFixed(1)}%"></div></div>
    </div>`;
  },

    document.getElementById('view-inv-detail').classList.add('active');

  // ── CALCULATOR ───────────────────────────────────────────────
  calcMode(m){
    this._calcMode=m;
    document.getElementById('mode-oz').classList.toggle('active',m==='oz');
    document.getElementById('mode-bars').classList.toggle('active',m==='bars');
    document.getElementById('grp-oz').style.display=m==='oz'?'block':'none';
    document.getElementById('grp-bars').style.display=m==='bars'?'block':'none';
    document.getElementById('grp-barwt').style.display=m==='bars'?'block':'none';
    this.calcUpdate();
  },
  populateCalcRecipes(){
    const sel=document.getElementById('calc-recipe');
    const cur=sel.value;
    sel.innerHTML='<option value="">— Choose a recipe —</option>'+
      this.recipes.filter(r=>r.batchSize).map(r=>`<option value="${r.id}"${r.id===cur?' selected':''}>${this.h(r.name)} (${r.batchSize} ${r.batchUnit||'oz'})</option>`).join('');
  },
  calcUpdate(){
    const rid=document.getElementById('calc-recipe').value;
    const wrap=document.getElementById('calc-result');
    if(!rid){wrap.innerHTML='';return;}
    const r=this.recipes.find(x=>x.id===rid);
    if(!r||!r.batchSize){wrap.innerHTML='';return;}
    let targetOz;
    if(this._calcMode==='oz'){
      targetOz=parseFloat(document.getElementById('calc-oz').value);
    } else {
      const bars=parseFloat(document.getElementById('calc-bars').value)||0;
      const bw=parseFloat(document.getElementById('calc-barwt').value)||3.5;
      targetOz=bars*bw;
    }
    if(!targetOz||targetOz<=0){
      wrap.innerHTML=`<div class="calc-result"><div style="text-align:center;color:var(--muted);font-size:.84rem;padding:12px">Enter a target amount above to see scaled ingredients</div></div>`;
      return;
    }
    const orig=parseFloat(r.batchSize)||1;
    const scale=targetOz/orig;
    const rows=(r.ingredients||[]).map(i=>{
      const sv=(parseFloat(i.amount)||0)*scale;
      const d=sv<0.1?sv.toFixed(3):sv<10?sv.toFixed(2):sv.toFixed(1);
      return `<div class="calc-row"><span class="calc-row-name">${this.h(i.name)}</span><span class="calc-row-amt">${d} ${i.unit}</span></div>`;
    }).join('');
    const est=this._calcMode==='oz'?`~${Math.round(targetOz/3.5)} bars @ 3.5 oz ea`:`${document.getElementById('calc-bars').value} bars @ ${document.getElementById('calc-barwt').value} oz`;
    wrap.innerHTML=`
      <div class="calc-result">
        <div class="calc-result-title">📋 Scaled to ${targetOz.toFixed(1)} oz</div>
        ${rows}
        <div class="calc-note">Scale factor: ${scale.toFixed(3)}× · ${est}</div>
      </div>`;
  },

  // ── ORDER REPORT ─────────────────────────────────────────────
  renderOrders(){
    const wrap=document.getElementById('report-body'); if(!wrap) return;
    const low=this.inventory.filter(i=>this._iStat(i)!=='ok');
    if(!low.length){
      wrap.innerHTML=`<div class="report-top"><h2>📋 Order Report</h2></div><div class="all-good"><div style="font-size:2.5rem">✅</div><p>All ingredients are well-stocked!</p></div>`;
      return;
    }
    const out=low.filter(i=>this._iStat(i)==='out');
    const lows=low.filter(i=>this._iStat(i)==='low');
    const mkItems=arr=>arr.map(i=>{
      const need=Math.max(0,i.reorderAt*2-i.quantity);
      return `<div class="report-item">
        <div><div class="ri-name">${this.h(i.name)}</div><div class="ri-detail">${this.h(i.category)}${i.supplier?' · '+this.h(i.supplier):''}</div></div>
        <div><div class="ri-need">Need ${need.toFixed(1)} ${i.unit}</div><div class="ri-have">Have ${i.quantity} ${i.unit}</div></div>
      </div>`;
    }).join('');
    wrap.innerHTML=`
      <div class="report-top"><h2>📋 Order Report</h2><button class="copy-btn" onclick="App.copyReport()">Copy List</button></div>
      ${out.length?`<div class="report-section"><div class="report-sec-title">🚨 Out of Stock — ${out.length} item${out.length>1?'s':''}</div>${mkItems(out)}</div>`:''}
      ${lows.length?`<div class="report-section"><div class="report-sec-title">⚠️ Low Stock — ${lows.length} item${lows.length>1?'s':''}</div>${mkItems(lows)}</div>`:''}`;
  },
  copyReport(){
    const low=this.inventory.filter(i=>this._iStat(i)!=='ok');
    if(!low.length) return;
    const lines=['SUDSY SISTERS — ORDER LIST',new Date().toLocaleDateString('en-US'),''];
    const out=low.filter(i=>this._iStat(i)==='out');
    const lows=low.filter(i=>this._iStat(i)==='low');
    if(out.length){lines.push('OUT OF STOCK:');out.forEach(i=>{const n=Math.max(0,i.reorderAt*2-i.quantity);lines.push(`  • ${i.name}: need ${n.toFixed(1)} ${i.unit}${i.supplier?' ('+i.supplier+')':''}`);});lines.push('');}
    if(lows.length){lines.push('LOW STOCK:');lows.forEach(i=>{const n=Math.max(0,i.reorderAt*2-i.quantity);lines.push(`  • ${i.name}: need ${n.toFixed(1)} ${i.unit} (have ${i.quantity})${i.supplier?' ('+i.supplier+')':''}`);});}
    navigator.clipboard.writeText(lines.join('\n')).then(()=>this._toast('Copied to clipboard!')).catch(()=>this._toast('Copy failed'));
  },

  // ── MAKE BATCH ───────────────────────────────────────────────
  makeBatch(id){
    const r=this.recipes.find(x=>x.id===id);
    if(!r||!r.ingredients||!r.ingredients.length){this._toast('No ingredients listed');return;}
    // Match each ingredient to inventory by name (case-insensitive partial match)
    const matches=r.ingredients.map(ing=>{
      const nm=ing.name.toLowerCase();
      const inv=this.inventory.find(i=>
        i.name.toLowerCase()===nm||
        i.name.toLowerCase().includes(nm)||
        nm.includes(i.name.toLowerCase())
      );
      return {ing, inv};
    });
    const found=matches.filter(m=>m.inv);
    const notFound=matches.filter(m=>!m.inv);
    // Build ingredient list HTML
    const rows=matches.map(m=>{
      if(m.inv){
        const after=Math.max(0,m.inv.quantity-(parseFloat(m.ing.amount)||0));
        const willBelow=after<=m.inv.reorderAt;
        return `<div class="batch-ing-row">
          <div class="batch-ing-left">${this.h(m.ing.name)}</div>
          <div class="batch-ing-right">
            <div class="batch-found">− ${m.ing.amount} ${m.ing.unit}</div>
            <div class="batch-inv-note">${m.inv.quantity} → ${Math.round(after*1000)/1000} ${m.inv.unit}${willBelow?' ⚠️':''}</div>
          </div>
        </div>`;
      } else {
        return `<div class="batch-ing-row">
          <div class="batch-ing-left">${this.h(m.ing.name)}</div>
          <div class="batch-ing-right batch-notfound">Not in inventory</div>
        </div>`;
      }
    }).join('');
    document.getElementById('batch-title').textContent=`Make: ${r.name}`;
    document.getElementById('batch-ing-list').innerHTML=rows;
    // Warning if some items not in inventory
    const warn=document.getElementById('batch-warn');
    if(notFound.length){
      warn.style.display='block';
      warn.textContent=`⚠️ ${notFound.length} ingredient${notFound.length>1?'s':''} not found in inventory and will be skipped.`;
    } else {
      warn.style.display='none';
    }
    document.getElementById('batch-ok').onclick=()=>{
      this.closeModal('modal-batch');
      this._applyBatch(matches);
    };
    document.getElementById('modal-batch').classList.add('open');
  },
  _applyBatch(matches){
    let changed=0;
    matches.forEach(m=>{
      if(!m.inv) return;
      const amt=parseFloat(m.ing.amount)||0;
      m.inv.quantity=Math.round(Math.max(0,m.inv.quantity-amt)*1000)/1000;
      changed++;
    });
    this._saveI();
    this.renderInventory();
    this.renderOrders();
    this._toast(`Batch logged — ${changed} inventory item${changed!==1?'s':''} updated`);
  },

  // ── MODALS & UTILS ───────────────────────────────────────────
  closeModal(id){ document.getElementById(id).classList.remove('open'); },

  // ── BARCODE SCANNER ──────────────────────────────────────────
  _scanner: null,
  _scanResult: null,

  openScanner(){
    this._scanResult = null;
    document.getElementById('scan-status').innerHTML = '';
    document.getElementById('scan-use-btn').style.display = 'none';
    document.getElementById('scan-overlay').classList.add('open');
    // Small delay to let overlay render before camera init
    setTimeout(() => this._startCamera(), 300);
  },

  _startCamera(){
    if(this._scanner){ this._scanner.clear(); this._scanner = null; }
    try {
      this._scanner = new Html5Qrcode('scan-reader');
      this._scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 220, height: 140 }, aspectRatio: 1.7 },
        (code) => this._onScanSuccess(code),
        () => {} // ignore per-frame errors
      ).catch(err => {
        document.getElementById('scan-status').innerHTML =
          `<span style="color:#ff6b6b">Camera error: ${err.message || 'Permission denied'}</span>`;
      });
    } catch(e) {
      document.getElementById('scan-status').innerHTML =
        `<span style="color:#ff6b6b">Scanner unavailable. Try Chrome or update your browser.</span>`;
    }
  },

  closeScanner(){
    if(this._scanner){
      this._scanner.stop().catch(()=>{}).finally(()=>{
        this._scanner.clear();
        this._scanner = null;
      });
    }
    document.getElementById('scan-overlay').classList.remove('open');
  },

  _onScanSuccess(code){
    if(this._scanResult && this._scanResult.barcode === code) return; // already processed
    // Stop scanning after first hit
    if(this._scanner) this._scanner.stop().catch(()=>{});
    this._scanResult = { barcode: code, product: null };
    document.getElementById('scan-status').innerHTML =
      `<div class="scan-lookup"><div class="scan-spinner"></div> Looking up barcode ${code}…</div>`;
    this._lookupBarcode(code);
  },

  async _lookupBarcode(code){
    let product = null;
    const statusEl = document.getElementById('scan-status');

    // Try Open Food Facts first (free, no key)
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json`);
      const data = await res.json();
      if(data.status === 1 && data.product){
        const p = data.product;
        const name = p.product_name || p.product_name_en || '';
        const brand = p.brands || '';
        product = {
          name: brand && !name.toLowerCase().includes(brand.toLowerCase()) ? `${brand} ${name}`.trim() : name,
          barcode: code,
          source: 'Open Food Facts'
        };
      }
    } catch(e){}

    // Fallback: UPC Item DB
    if(!product || !product.name){
      try {
        const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`);
        const data = await res.json();
        if(data.items && data.items.length){
          const item = data.items[0];
          product = {
            name: item.title || item.brand || '',
            barcode: code,
            source: 'UPC ItemDB'
          };
        }
      } catch(e){}
    }

    if(product && product.name){
      this._scanResult = { barcode: code, product };
      statusEl.innerHTML = `<span style="color:#a8e6b8;font-weight:700">✅ Found: ${this.h(product.name)}</span>`;
      document.getElementById('scan-use-btn').style.display = 'block';
    } else {
      // Not found in database — still let them use the barcode
      this._scanResult = { barcode: code, product: { name: '', barcode: code, source: null } };
      statusEl.innerHTML = `<span style="color:#ffd97d">⚠️ Barcode ${code} not found in database.<br>You can still add it manually.</span>`;
      document.getElementById('scan-use-btn').style.display = 'block';
      document.getElementById('scan-use-btn').textContent = 'Add Manually ✓';
    }
  },

  useScanResult(){
    if(!this._scanResult) return;
    this.closeScanner();
    // Pre-fill form if it's open
    const nameField = document.getElementById('iin');
    if(nameField && this._scanResult.product && this._scanResult.product.name){
      nameField.value = this._scanResult.product.name;
      nameField.focus();
      // Store barcode in notes if field exists
      const notesField = document.getElementById('iino');
      if(notesField && !notesField.value){
        notesField.value = `Barcode: ${this._scanResult.barcode}`;
      }
      this._toast(`Auto-filled: ${this._scanResult.product.name}`);
    } else {
      // No product name found — just put barcode in notes
      const notesField = document.getElementById('iino');
      if(notesField) notesField.value = `Barcode: ${this._scanResult.barcode}`;
      this._toast('Barcode saved to notes — enter name manually');
    }
  },
  _confirm(title,msg,cb){
    document.getElementById('confirm-title').textContent=title;
    document.getElementById('confirm-msg').textContent=msg;
    document.getElementById('confirm-ok').onclick=()=>{this.closeModal('modal-confirm');cb();};
    document.getElementById('modal-confirm').classList.add('open');
  },
  _toast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(this._tt);
    this._tt=setTimeout(()=>t.classList.remove('show'),2600);
  }
};

document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');}));
App.init();
</script>
